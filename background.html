<div class="space-bg">
    <div class="stars"></div>
    <div class="shooting-star"></div>
</div>

<style>
.space-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
    z-index: -1;
    overflow: hidden;
}

/* Animasi Bintang Jatuh Sederhana */
.shooting-star {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 2px;
    height: 2px;
    background: white;
    box-shadow: 0 0 10px white;
    animation: shoot 5s linear infinite;
}

@keyframes shoot {
    0% { transform: translateX(100vw) translateY(-100vh); opacity: 1; }
    20% { transform: translateX(-100vw) translateY(100vh); opacity: 0; }
    100% { opacity: 0; }
}
</style>
